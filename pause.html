<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindful Pause</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #2d3748;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 16px;
    }

    label {
      display: block;
      color: #2d3748;
      margin-bottom: 10px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }

    button:hover:not(:disabled) {
      background: #5568d3;
    }

    button:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-weight: 500;
    }

    #timer {
      margin-top: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
      display: none;
    }

    .emoji {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🤔</div>
    <h1>Before you scroll...</h1>
    <p class="subtitle">Take a moment to reflect on your intention</p>

    <form id="pauseForm">
      <label for="reason">Why do you want to use Instagram right now?</label>
      <textarea
        id="reason"
        placeholder="I want to check messages from my friend about tonight's plans..."
        required
        autofocus
      ></textarea>

      <button type="submit" id="submitBtn">Continue</button>
    </form>

    <div id="message"></div>
    <div id="timer"></div>
  </div>
</body>
</html>
